<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eid Mubarak Greeting</title>
    <style>
        :root {
            --gold: #ffd700;
            --soft-gold: #ffec8b;
            --deep-blue: #0a0a2e;
            --royal-purple: #1a0033;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        /* Background Sky */
        .card {
            position: relative;
            width: 90vw;
            max-width: 600px;
            height: 80vh;
            background: radial-gradient(circle at top, var(--royal-purple), var(--deep-blue));
            border: 5px solid var(--gold);
            border-radius: 20px;
            box-shadow: 0 0 50px rgba(0,0,0,0.8), inset 0 0 100px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            overflow: hidden;
        }

        /* Geometric Border Overlay */
        .card::before {
            content: "";
            position: absolute;
            inset: 10px;
            border: 2px solid rgba(255, 215, 0, 0.3);
            pointer-events: none;
            /* Simple CSS pattern */
            background-image: radial-gradient(circle, var(--gold) 1px, transparent 1px);
            background-size: 30px 30px;
            opacity: 0.1;
        }

        /* The Moon */
        .moon {
            position: absolute;
            top: 40px;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            box-shadow: 15px 15px 0 0 var(--soft-gold);
            filter: drop-shadow(0 0 20px rgba(255, 236, 139, 0.8));
            transform: rotate(-20px);
        }

        /* Text Styling */
        h1 {
            color: var(--gold);
            font-size: 4rem;
            margin: 0;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.6);
            z-index: 10;
        }

        p {
            color: #fff;
            font-size: 1.2rem;
            max-width: 80%;
            opacity: 0.9;
            z-index: 10;
        }

        /* Mosque Silhouette */
        .mosque {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 120px;
            background: #05051a;
            clip-path: polygon(0% 100%, 10% 100%, 10% 80%, 15% 70%, 20% 80%, 20% 100%, 40% 100%, 40% 60%, 45% 40%, 50% 30%, 55% 40%, 60% 60%, 60% 100%, 80% 100%, 80% 80%, 85% 70%, 90% 80%, 90% 100%, 100% 100%);
        }

        /* Firecrackers */
        .firework {
            position: absolute;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            animation: explode 3s infinite;
        }

        @keyframes explode {
            0% { transform: scale(1); opacity: 1; box-shadow: 0 0 0 white; }
            50% { opacity: 1; }
            100% { 
                transform: scale(25); 
                opacity: 0; 
                box-shadow: 
                    20px 0px 5px var(--color), 
                    -20px 0px 5px var(--color), 
                    0px 20px 5px var(--color), 
                    0px -20px 5px var(--color),
                    15px 15px 5px var(--color),
                    -15px -15px 5px var(--color); 
            }
        }

        /* Positioning Firecrackers */
        .f1 { top: 15%; left: 10%; --color: gold; animation-delay: 0s; }
        .f2 { top: 20%; right: 15%; --color: #ff4d4d; animation-delay: 1s; }
        .f3 { bottom: 30%; left: 15%; --color: #00ffcc; animation-delay: 1.5s; }
        .f4 { top: 50%; right: 5%; --color: #7fff00; animation-delay: 0.5s; }

        /* Twinkling Stars */
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--duration) infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="moon"></div>
        
        <div id="star-container"></div>

        <div class="firework f1"></div>
        <div class="firework f2"></div>
        <div class="firework f3"></div>
        <div class="firework f4"></div>

        <h1>Eid Mubarak</h1>
        <p>May this Eid bring you joy, peace, and blessings.</p>

        <div class="mosque"></div>
    </div>

    <script>
        // Generate stars dynamically
        const container = document.getElementById('star-container');
        for (let i = 0; i < 50; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 3 + 'px';
            star.style.width = size;
            star.style.height = size;
            star.style.top = Math.random() * 100 + '%';
            star.style.left = Math.random() * 100 + '%';
            star.style.setProperty('--duration', (Math.random() * 3 + 2) + 's');
            container.appendChild(star);
        }
    </script>
</body>
</html>
