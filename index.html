<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Eid Mubarak</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Amiri:wght@400;700&family=Raleway:wght@200;300;400&display=swap" rel="stylesheet"/>
<style>
:root {
  --gold:#e8a020; --gold2:#ffd166; --gold3:#fff0b3;
  --pink:#f9b8c4; --cream:#fff8f0; --wood:#5c2e0a;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:radial-gradient(ellipse at 50% 30%,#2a0e00 0%,#100500 100%);display:flex;align-items:center;justify-content:center;overflow:hidden;font-family:'Raleway',sans-serif;padding:10px}

.frame{position:relative;width:min(560px,96vw);padding:14px;background:linear-gradient(135deg,#c8780a,#f0c040,#c8780a,#f5d060,#c8780a);border-radius:6px;box-shadow:0 0 0 3px #7a3a00,0 0 40px rgba(240,160,30,0.6),0 0 100px rgba(240,130,20,0.3),0 30px 80px rgba(0,0,0,0.9);animation:frameAppear 0.8s ease both}
@keyframes frameAppear{from{opacity:0;transform:scale(0.9)}to{opacity:1;transform:scale(1)}}
.frame::before{content:'';position:absolute;inset:4px;border:2px solid rgba(255,240,150,0.5);border-radius:4px;pointer-events:none;z-index:100;background:repeating-linear-gradient(45deg,rgba(255,220,80,0.12) 0,rgba(255,220,80,0.12) 1px,transparent 0,transparent 12px),repeating-linear-gradient(-45deg,rgba(255,220,80,0.12) 0,rgba(255,220,80,0.12) 1px,transparent 0,transparent 12px)}

.scene{position:relative;width:100%;overflow:hidden;border-radius:3px;background:linear-gradient(180deg,#3d1500 0%,#7a2e00 20%,#c05010 40%,#e87030 55%,#f0a060 70%,#f8c890 85%,#fde0b0 100%);min-height:640px;display:flex;flex-direction:column;align-items:center}

.stars-layer{position:absolute;inset:0;z-index:1;pointer-events:none}
.star{position:absolute;background:white;border-radius:50%;animation:starTwinkle var(--d,3s) ease-in-out infinite var(--dl,0s)}
@keyframes starTwinkle{0%,100%{opacity:0.1}50%{opacity:0.9}}

.arch-frame{position:absolute;top:0;left:50%;transform:translateX(-50%);width:280px;height:340px;z-index:5;pointer-events:none}
.arch-frame::before{content:'';position:absolute;inset:0;border:3px solid var(--gold2);border-bottom:none;border-radius:140px 140px 0 0;box-shadow:0 0 20px rgba(255,200,50,0.6),inset 0 0 20px rgba(255,200,50,0.1)}
.arch-frame::after{content:'';position:absolute;inset:10px;border:1px solid rgba(255,220,100,0.4);border-bottom:none;border-radius:130px 130px 0 0}

.door-container{position:absolute;top:30px;left:50%;transform:translateX(-50%);width:250px;height:320px;z-index:6;display:flex;perspective:800px}

.door-left{width:50%;height:100%;background:linear-gradient(135deg,#6b2f08,#9b4a18,#7a3510,#c07030);border-right:2px solid #2a0e00;transform-origin:left center;transform-style:preserve-3d;animation:openLeft 2s cubic-bezier(0.4,0,0.2,1) 1.2s both;position:relative;overflow:hidden;box-shadow:inset -4px 0 12px rgba(0,0,0,0.5)}
.door-left::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(180deg,transparent 0,transparent 18px,rgba(0,0,0,0.08) 18px,rgba(0,0,0,0.08) 20px)}
.door-left::after{content:'✦';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:2rem;color:rgba(255,210,80,0.5);text-shadow:0 0 10px rgba(255,180,30,0.8)}
@keyframes openLeft{0%{transform:rotateY(0deg)}100%{transform:rotateY(-75deg)}}

.door-right{width:50%;height:100%;background:linear-gradient(135deg,#7a3510,#9b4a18,#6b2f08,#b06020);border-left:2px solid #2a0e00;transform-origin:right center;transform-style:preserve-3d;animation:openRight 2s cubic-bezier(0.4,0,0.2,1) 1.2s both;position:relative;overflow:hidden;box-shadow:inset 4px 0 12px rgba(0,0,0,0.5)}
.door-right::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(180deg,transparent 0,transparent 18px,rgba(0,0,0,0.08) 18px,rgba(0,0,0,0.08) 20px)}
.door-right::after{content:'✦';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:2rem;color:rgba(255,210,80,0.5);text-shadow:0 0 10px rgba(255,180,30,0.8)}
@keyframes openRight{0%{transform:rotateY(0deg)}100%{transform:rotateY(75deg)}}

.knob-l,.knob-r{position:absolute;width:12px;height:12px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#ffe090,#c8780a);top:50%;box-shadow:0 0 6px rgba(255,180,30,0.6);z-index:10}
.knob-l{right:4px;transform:translateY(-50%)}
.knob-r{left:4px;transform:translateY(-50%)}

.light-burst{position:absolute;top:30px;left:50%;transform:translateX(-50%);width:250px;height:320px;background:radial-gradient(ellipse at 50% 40%,rgba(255,220,100,0.95) 0%,rgba(255,180,50,0.7) 30%,rgba(255,140,20,0.3) 60%,transparent 100%);z-index:4;opacity:0;animation:lightFlood 1.5s ease 2.2s both;pointer-events:none;filter:blur(8px)}
@keyframes lightFlood{0%{opacity:0;transform:translateX(-50%) scale(0.5)}100%{opacity:1;transform:translateX(-50%) scale(1.4)}}

.scene-content{position:relative;z-index:8;width:100%;display:flex;flex-direction:column;align-items:center;opacity:0;animation:revealScene 1.5s ease 3s both;padding-top:370px}
@keyframes revealScene{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

.brothers{position:absolute;top:140px;left:50%;transform:translateX(-50%);z-index:7;display:flex;align-items:flex-end;justify-content:center;opacity:0;animation:revealScene 1.5s ease 3.2s both;filter:drop-shadow(0 0 20px rgba(255,180,50,0.5))}
.person{display:flex;flex-direction:column;align-items:center;position:relative}
.kufi{width:26px;height:13px;border-radius:13px 13px 0 0;background:rgba(255,240,200,0.85);position:relative;z-index:2}
.kufi::after{content:'';position:absolute;bottom:0;left:3px;right:3px;height:3px;background:rgba(200,160,60,0.7);border-radius:0 0 3px 3px}
.head{width:28px;height:32px;border-radius:50% 50% 45% 45%;background:rgba(220,180,130,0.9);margin-top:-2px;z-index:2}
.thobe{width:var(--tw,52px);height:90px;background:linear-gradient(180deg,rgba(255,248,235,0.9),rgba(240,230,210,0.85));border-radius:10px 10px 5px 5px;margin-top:2px;position:relative;z-index:2}
.thobe::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:16px;height:18px;border-left:1px solid rgba(200,160,60,0.6);border-right:1px solid rgba(200,160,60,0.6);border-bottom:1px solid rgba(200,160,60,0.6)}
.person-left{transform:rotate(-5deg) translateX(12px)}
.person-right{transform:rotate(5deg) translateX(-12px)}
.arms{position:absolute;top:50px;width:70px;height:20px}
.arm-l{position:absolute;left:0;top:0;width:40px;height:10px;background:rgba(255,248,235,0.85);border-radius:5px;transform:rotate(-20deg) translateX(10px)}
.arm-r{position:absolute;right:0;top:0;width:40px;height:10px;background:rgba(255,248,235,0.85);border-radius:5px;transform:rotate(20deg) translateX(-10px)}
.hug-halo{position:absolute;width:130px;height:130px;border-radius:50%;background:radial-gradient(circle,rgba(255,220,100,0.4) 0%,transparent 70%);top:-20px;left:50%;transform:translateX(-50%);animation:haloBreathe 3s ease-in-out infinite;z-index:1}
@keyframes haloBreathe{0%,100%{transform:translateX(-50%) scale(1);opacity:0.7}50%{transform:translateX(-50%) scale(1.15);opacity:1}}

.eid-title{font-family:'Cinzel Decorative',serif;font-size:clamp(1.7rem,6.5vw,2.5rem);font-weight:700;color:var(--gold3);text-align:center;letter-spacing:0.05em;padding:0 20px;z-index:9;text-shadow:0 0 8px #fffbe0,0 0 20px rgba(255,220,80,1),0 0 45px rgba(255,180,30,0.8),0 0 90px rgba(255,140,0,0.5);animation:titleFlicker 3s ease-in-out infinite;line-height:1.2}
@keyframes titleFlicker{0%,100%{text-shadow:0 0 8px #fffbe0,0 0 20px rgba(255,220,80,1),0 0 45px rgba(255,180,30,0.8),0 0 90px rgba(255,140,0,0.5)}30%{text-shadow:0 0 6px #fffbe0,0 0 15px rgba(255,210,60,1),0 0 35px rgba(255,160,20,0.7)}50%{text-shadow:0 0 12px #fffff0,0 0 30px rgba(255,235,100,1),0 0 60px rgba(255,200,50,0.9),0 0 110px rgba(255,160,0,0.6)}}
.eid-arabic{font-family:'Amiri',serif;font-size:clamp(1.2rem,4vw,1.7rem);color:rgba(255,220,120,0.85);text-align:center;letter-spacing:0.1em;margin-top:6px;z-index:9;text-shadow:0 0 20px rgba(255,180,50,0.5)}
.blessing{text-align:center;padding:0 36px;z-index:9;margin:10px 0}
.bl{font-size:clamp(0.72rem,2vw,0.88rem);color:rgba(255,230,180,0.7);line-height:2;font-weight:200;letter-spacing:0.1em}
.divider{display:flex;align-items:center;gap:8px;width:72%;z-index:9;margin:10px 0}
.div-line{flex:1;height:1px;background:linear-gradient(to right,transparent,rgba(255,210,80,0.7),transparent)}
.div-gem{width:6px;height:6px;background:var(--gold2);transform:rotate(45deg);box-shadow:0 0 8px var(--gold);flex-shrink:0}

.lanterns-row{position:absolute;top:0;left:0;right:0;display:flex;justify-content:space-around;padding:0 20px;z-index:9;opacity:0;animation:revealScene 1.5s ease 3.4s both}
.lantern{display:flex;flex-direction:column;align-items:center;animation:swing var(--ls,4s) ease-in-out infinite var(--ld,0s);transform-origin:top center;position:relative}
.ln-string{width:1px;height:var(--sh,30px);background:rgba(200,150,50,0.5)}
.ln-cap{width:24px;height:7px;background:var(--lc,#c8780a);border-radius:3px 3px 0 0;box-shadow:0 0 6px var(--lc,#c8780a)}
.ln-body{width:18px;height:32px;background:radial-gradient(ellipse at 35% 35%,rgba(255,255,200,0.9),var(--lc,#c8780a));border-radius:35%;box-shadow:0 0 12px var(--lc,#c8780a),0 0 25px rgba(255,180,50,0.3);animation:lanternGlow var(--ls,4s) ease-in-out infinite var(--ld,0s)}
@keyframes lanternGlow{0%,100%{box-shadow:0 0 10px var(--lc,#c8780a),0 0 20px rgba(255,180,50,0.3)}50%{box-shadow:0 0 18px var(--lc,#c8780a),0 0 35px rgba(255,180,50,0.5)}}
.ln-bot{width:9px;height:11px;background:var(--lc,#c8780a);border-radius:0 0 50% 50%}
.ln-tassel{width:1px;height:12px;background:rgba(200,150,50,0.5)}
.ln-pool{position:absolute;bottom:-5px;width:50px;height:10px;border-radius:50%;background:rgba(255,200,80,0.2);filter:blur(5px)}
@keyframes swing{0%,100%{transform:rotate(calc(var(--sr,-1) * 7deg))}50%{transform:rotate(calc(var(--sr,-1) * -7deg))}}

.candles-row{position:absolute;bottom:0;left:0;right:0;display:flex;align-items:flex-end;justify-content:center;gap:12px;z-index:9;padding:0 20px 0;opacity:0;animation:revealScene 1.5s ease 3.6s both}
.candle{display:flex;flex-direction:column;align-items:center;position:relative}
.cn-body{width:var(--cw,14px);height:var(--ch,55px);background:linear-gradient(to right,rgba(255,240,220,0.6),rgba(255,255,245,0.9),rgba(255,240,220,0.6));border-radius:3px 3px 2px 2px;box-shadow:inset 2px 0 4px rgba(255,200,150,0.4),0 0 8px rgba(255,180,80,0.3);position:relative}
.cn-wick{width:2px;height:8px;background:#4a2a08;border-radius:1px;margin-bottom:-1px}
.cn-flame{position:relative;width:10px;height:18px;margin-bottom:-2px}
.cn-flame::before{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:10px;height:18px;background:radial-gradient(ellipse at 50% 80%,rgba(255,255,180,1) 0%,rgba(255,180,30,0.9) 40%,rgba(255,80,0,0.7) 70%,transparent 100%);border-radius:50% 50% 30% 30%;animation:flicker var(--fd,0.15s) ease-in-out infinite var(--fdl,0s)}
.cn-flame::after{content:'';position:absolute;bottom:1px;left:50%;transform:translateX(-50%);width:5px;height:9px;background:rgba(255,255,220,0.95);border-radius:50% 50% 30% 30%;animation:flicker var(--fd,0.12s) ease-in-out infinite reverse var(--fdl,0s)}
@keyframes flicker{0%{transform:translateX(-50%) scaleX(1) scaleY(1) rotate(0deg)}20%{transform:translateX(-52%) scaleX(0.95) scaleY(1.05) rotate(-2deg)}40%{transform:translateX(-48%) scaleX(1.05) scaleY(0.95) rotate(2deg)}60%{transform:translateX(-50%) scaleX(0.9) scaleY(1.08) rotate(-1deg)}80%{transform:translateX(-51%) scaleX(1.02) scaleY(0.98) rotate(1deg)}100%{transform:translateX(-50%) scaleX(1) scaleY(1) rotate(0deg)}}
.cn-glow{position:absolute;bottom:-8px;left:50%;transform:translateX(-50%);width:40px;height:14px;border-radius:50%;background:rgba(255,180,50,0.25);filter:blur(6px)}
.cn-drip{position:absolute;top:8px;left:2px;width:4px;height:10px;background:rgba(255,245,230,0.7);border-radius:0 0 50% 50%}

.petal{position:absolute;border-radius:50% 0 50% 0;opacity:0;z-index:10;animation:petalFall var(--pd,6s) ease-in infinite var(--pdl,0s);pointer-events:none}
@keyframes petalFall{0%{opacity:0;transform:translateY(-20px) rotate(0deg) translateX(0)}10%{opacity:0.8}90%{opacity:0.5}100%{opacity:0;transform:translateY(650px) rotate(360deg) translateX(var(--px,20px))}}

.mehendi-svg{position:absolute;inset:0;z-index:2;pointer-events:none;width:100%;height:100%}
.mehendi-path{fill:none;stroke:rgba(200,140,30,0.35);stroke-width:1.5;stroke-dasharray:600;stroke-dashoffset:600;animation:drawMehendi 4s ease 3.5s both}
@keyframes drawMehendi{to{stroke-dashoffset:0}}

.ground{position:absolute;bottom:0;left:0;right:0;height:60px;background:linear-gradient(to top,rgba(120,60,10,0.6),transparent);z-index:8}
.scene-moon{position:absolute;top:18px;left:50%;transform:translateX(-50%);z-index:3}
.scene-moon .moon-body{width:55px;height:55px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#fffce0,#f5d060 50%,#d4960a);box-shadow:0 0 15px rgba(255,230,80,0.9),0 0 40px rgba(255,200,40,0.5),0 0 80px rgba(255,170,0,0.3);animation:moonFloat 5s ease-in-out infinite;position:relative}
.scene-moon .moon-body::before{content:'';position:absolute;width:44px;height:44px;border-radius:50%;background:#3d1500;top:-3px;left:14px}
@keyframes moonFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.horizon-glow{position:absolute;bottom:55px;left:0;right:0;height:120px;background:linear-gradient(to top,rgba(240,120,80,0.2),rgba(255,160,120,0.1),transparent);z-index:2}
</style>
</head>
<body>
<div class="frame">
  <div class="scene" id="scene">
    <div class="stars-layer" id="stars"></div>
    <svg class="mehendi-svg" viewBox="0 0 560 640" preserveAspectRatio="none">
      <path class="mehendi-path" d="M20,20 Q80,10 140,20 Q200,30 260,18 Q320,8 380,20 Q440,30 500,20 Q540,15 545,25"/>
      <path class="mehendi-path" style="animation-delay:4s" d="M20,620 Q80,630 140,620 Q200,610 260,622 Q320,632 380,620 Q440,610 500,622 Q535,628 545,615"/>
      <path class="mehendi-path" style="animation-delay:4.5s" d="M18,30 Q10,100 18,180 Q26,260 16,340 Q8,420 18,500 Q26,560 18,610"/>
      <path class="mehendi-path" style="animation-delay:5s" d="M542,30 Q550,100 542,180 Q534,260 544,340 Q552,420 542,500 Q534,560 542,610"/>
      <path class="mehendi-path" style="animation-delay:5.5s" d="M20,20 Q35,35 20,50 M20,20 Q40,20 45,35 Q50,50 35,55"/>
      <path class="mehendi-path" style="animation-delay:5.8s" d="M540,20 Q525,35 540,50 M540,20 Q520,20 515,35 Q510,50 525,55"/>
    </svg>
    <div class="scene-moon"><div class="moon-body"></div></div>
    <div class="arch-frame"></div>
    <div class="light-burst"></div>
    <div class="door-container">
      <div class="door-left"><div class="knob-l"></div></div>
      <div class="door-right"><div class="knob-r"></div></div>
    </div>
    <div class="lanterns-row">
      <div class="lantern" style="--lc:#e8600a;--ls:3.8s;--ld:0s;--sh:25px;--sr:-1"><div class="ln-string"></div><div class="ln-cap"></div><div class="ln-body"></div><div class="ln-bot"></div><div class="ln-tassel"></div><div class="ln-pool"></div></div>
      <div class="lantern" style="--lc:#d4145a;--ls:4.3s;--ld:.4s;--sh:40px;--sr:1"><div class="ln-string"></div><div class="ln-cap"></div><div class="ln-body"></div><div class="ln-bot"></div><div class="ln-tassel"></div><div class="ln-pool"></div></div>
      <div class="lantern" style="--lc:#f0c040;--ls:3.5s;--ld:.8s;--sh:20px;--sr:-1"><div class="ln-string"></div><div class="ln-cap"></div><div class="ln-body"></div><div class="ln-bot"></div><div class="ln-tassel"></div><div class="ln-pool"></div></div>
      <div class="lantern" style="--lc:#e87890;--ls:4.6s;--ld:.2s;--sh:35px;--sr:1"><div class="ln-string"></div><div class="ln-cap"></div><div class="ln-body"></div><div class="ln-bot"></div><div class="ln-tassel"></div><div class="ln-pool"></div></div>
      <div class="lantern" style="--lc:#c87820;--ls:4s;--ld:.6s;--sh:28px;--sr:-1"><div class="ln-string"></div><div class="ln-cap"></div><div class="ln-body"></div><div class="ln-bot"></div><div class="ln-tassel"></div><div class="ln-pool"></div></div>
      <div class="lantern" style="--lc:#a855f7;--ls:3.7s;--ld:1s;--sh:42px;--sr:1"><div class="ln-string"></div><div class="ln-cap"></div><div class="ln-body"></div><div class="ln-bot"></div><div class="ln-tassel"></div><div class="ln-pool"></div></div>
    </div>
    <div class="brothers">
      <div class="hug-halo"></div>
      <div class="person person-left"><div class="kufi"></div><div class="head"></div><div class="thobe" style="--tw:50px"></div></div>
      <div class="arms"><div class="arm-l"></div><div class="arm-r"></div></div>
      <div class="person person-right"><div class="kufi"></div><div class="head"></div><div class="thobe" style="--tw:50px"></div></div>
    </div>
    <div class="horizon-glow"></div>
    <div class="scene-content">
      <div class="divider"><div class="div-line"></div><div class="div-gem"></div><div class="div-gem" style="margin:0 2px"></div><div class="div-gem"></div><div class="div-line"></div></div>
      <h1 class="eid-title">Eid Mubarak</h1>
      <p class="eid-arabic">عيد مبارك سعيد</p>
      <div class="divider" style="margin-top:10px"><div class="div-line"></div><div class="div-gem"></div><div class="div-gem" style="margin:0 2px"></div><div class="div-gem"></div><div class="div-line"></div></div>
      <div class="blessing">
        <p class="bl">May this blessed Eid open the doors</p>
        <p class="bl">of mercy, love &amp; endless joy for you</p>
        <p class="bl">Taqabbal Allaahu Minnaa Wa Minkum</p>
      </div>
    </div>
    <div class="ground"></div>
    <div class="candles-row">
      <div class="candle"><div class="cn-flame" style="--fd:0.13s;--fdl:0s"></div><div class="cn-wick"></div><div class="cn-body" style="--cw:12px;--ch:65px"><div class="cn-drip"></div></div><div class="cn-glow"></div></div>
      <div class="candle"><div class="cn-flame" style="--fd:0.11s;--fdl:0.03s"></div><div class="cn-wick"></div><div class="cn-body" style="--cw:16px;--ch:80px"><div class="cn-drip"></div></div><div class="cn-glow"></div></div>
      <div class="candle"><div class="cn-flame" style="--fd:0.09s;--fdl:0.06s"></div><div class="cn-wick"></div><div class="cn-body" style="--cw:18px;--ch:95px"><div class="cn-drip"></div></div><div class="cn-glow"></div></div>
      <div class="candle"><div class="cn-flame" style="--fd:0.14s;--fdl:0.02s"></div><div class="cn-wick"></div><div class="cn-body" style="--cw:22px;--ch:110px"><div class="cn-drip" style="left:auto;right:3px"></div></div><div class="cn-glow"></div></div>
      <div class="candle"><div class="cn-flame" style="--fd:0.1s;--fdl:0.04s"></div><div class="cn-wick"></div><div class="cn-body" style="--cw:18px;--ch:90px"><div class="cn-drip"></div></div><div class="cn-glow"></div></div>
      <div class="candle"><div class="cn-flame" style="--fd:0.12s;--fdl:0.01s"></div><div class="cn-wick"></div><div class="cn-body" style="--cw:14px;--ch:72px"><div class="cn-drip"></div></div><div class="cn-glow"></div></div>
      <div class="candle"><div class="cn-flame" style="--fd:0.15s;--fdl:0.05s"></div><div class="cn-wick"></div><div class="cn-body" style="--cw:11px;--ch:58px"><div class="cn-drip"></div></div><div class="cn-glow"></div></div>
    </div>
    <div id="petals"></div>
  </div>
</div>
<script>
// Stars
const st=document.getElementById('stars');
for(let i=0;i<60;i++){const s=document.createElement('div');s.className='star';const sz=(Math.random()*2+0.5).toFixed(1);s.style.cssText=`width:${sz}px;height:${sz}px;top:${Math.random()*55}%;left:${Math.random()*100}%;--d:${(2+Math.random()*4).toFixed(1)}s;--dl:${(Math.random()*4).toFixed(1)}s;`;st.appendChild(s);}

// Petals
const pe=document.getElementById('petals');
const pc=['#f7a8b8','#f9c0cc','#ffd6de','#f08898','#fbe0e6'];
for(let i=0;i<28;i++){const p=document.createElement('div');p.className='petal';const sz=(6+Math.random()*10).toFixed(0);const col=pc[Math.floor(Math.random()*pc.length)];const dx=((Math.random()*80)-40).toFixed(0);p.style.cssText=`width:${sz}px;height:${sz}px;background:${col};left:${(Math.random()*92).toFixed(1)}%;top:-20px;--pd:${(5+Math.random()*7).toFixed(1)}s;--pdl:${(Math.random()*10).toFixed(1)}s;--px:${dx}px;box-shadow:0 0 4px rgba(240,100,120,0.3);`;pe.appendChild(p);}
</script>
</body>
</html>
